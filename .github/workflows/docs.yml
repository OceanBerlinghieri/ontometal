name: GitHub Actions Demo
run-name: ${{ github.actor }} is generation ontology documentation
on: [push]
jobs:
  build-docs:
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-slim
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Verify Java Installation
        run: java -version
      - name: Download Widoco
        run: |
          wget https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar
      - name: Generate Documentation
        run: java -jar ./widoco-1.4.25-jar-with-dependencies_JDK-17.jar -ontFile ./ontology/ontometal.ttl -outFolder ./ontometal/docs/ -oops -rewriteAll -lang en