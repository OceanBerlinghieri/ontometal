name: build-docs
run-name: ${{ github.actor }} is generating ontology documentation
on:
  push:
    branches:
      - master

permissions:
  contents: write
  
jobs:
  build-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout master source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java Installation
        run: java -version

      - name: Download Widoco
        run: |
          wget https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar

      - name: Generate Documentation
        run: |
          java -jar ./widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile ./ontology/ontometal.ttl \
            -outFolder ./generated-docs/ \
            -oops -rewriteAll -lang en

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Copy generated docs to gh-pages
        run: |
          rm -rf gh-pages/*
          cp -r generated-docs/. gh-pages/
          test -f gh-pages/index_en.html
          cp gh-pages/index_en.html gh-pages/index.html

      - name: Commit and push docs to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name 'OceanBerlinghieri'
          git config user.email 'OceanBerlinghieri@users.noreply.github.com'
          git add --all
          if ! git diff --cached --quiet; then
            git commit -m 'Update documentation'
            git push origin gh-pages
          else
            echo 'No documentation changes to commit.'
          fi